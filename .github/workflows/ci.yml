name: CI - Admin Portal & Backend

on:
  push:
    branches: [main]
    paths:
      - "Carenest_Admin_Portal/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "Carenest_Admin_Portal/**"
      - ".github/workflows/ci.yml"

jobs:
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Carenest_Admin_Portal

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: Carenest_Admin_Portal/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: CI=false npm run build

  backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Carenest_Admin_Portal/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: Carenest_Admin_Portal/backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test || true
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder-key
          JWT_SECRET: test-secret-key-for-ci
          JWT_EXPIRES_IN: 24h
          NODE_ENV: test

      - name: Check server starts
        run: |
          timeout 5 node -e "
            const app = require('./server');
            const server = app.listen(5000, () => {
              console.log('Server started successfully');
              server.close();
              process.exit(0);
            });
          " || true
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder-key
          JWT_SECRET: test-secret-key-for-ci
          JWT_EXPIRES_IN: 24h
          NODE_ENV: test
